<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>FAQs</title><link href="assets/css/style.css" rel="stylesheet"/><style>
.browserLayout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:18px;align-items:start;margin-top:18px;}
.browserNav,.browserContent{background:linear-gradient(135deg, rgba(198,40,40,.10), transparent 42%),linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.10);border-radius:24px;box-shadow:0 18px 55px rgba(0,0,0,.30);}.browserNav{padding:14px;position:sticky;top:12px;}.browserContent{padding:24px 22px 20px;min-height:620px;}.navTitle{margin:2px 4px 14px;font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#e5d1d1;opacity:.9;}.typeBlock{margin:10px 0;border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;background:rgba(255,255,255,.02);}.typeButton{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;background:transparent;border:0;color:#fff;padding:16px;font:inherit;font-weight:800;text-align:left;cursor:pointer;}.typeButton:hover{background:rgba(255,255,255,.04);}.typeLabel{display:flex;align-items:center;gap:10px;min-width:0;}.typeIcon{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:rgba(198,40,40,.16);border:1px solid rgba(198,40,40,.34);font-size:18px;flex:0 0 38px;}.typeChevron{opacity:.8;transition:transform .18s ease;}.typeBlock.open .typeChevron{transform:rotate(90deg);}.subList{display:none;padding:0 10px 12px;}.typeBlock.open .subList{display:block;}.subButton{width:100%;background:rgba(255,255,255,.02);color:#d8dee7;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px 13px;margin:8px 0 0;text-align:left;font:inherit;cursor:pointer;line-height:1.35;}.subButton:hover{background:rgba(255,255,255,.05);color:#fff;}.subButton.active{background:rgba(198,40,40,.16);border-color:rgba(198,40,40,.34);color:#fff;}.contentBadge{display:inline-flex;align-items:center;gap:8px;min-height:38px;padding:0 14px;border-radius:999px;background:rgba(198,40,40,.16);border:1px solid rgba(198,40,40,.34);font-weight:800;margin-bottom:14px;}.contentTitle{margin:0 0 8px!important;font-size:30px;line-height:1.1;}.contentLead{margin:0 0 14px;color:#e5d1d1;font-weight:700;line-height:1.55;}.placeholderCard{background:rgba(0,0,0,.16);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:16px;margin-top:14px;line-height:1.65;}.placeholderCard p{margin:0 0 12px;}.editableSurface{position:relative}.bw-can-edit .editableText{outline:1px dashed rgba(198,40,40,.42);border-radius:10px;padding:3px 5px;}.bw-can-edit .editableText:focus{outline:2px solid rgba(198,40,40,.8);background:rgba(198,40,40,.08);}.inlineActions{display:none;gap:8px;flex-wrap:wrap;margin-top:14px}.bw-can-edit .inlineActions{display:flex}.inlineBtn{border:1px solid rgba(198,40,40,.48);background:rgba(198,40,40,.18);color:#fff;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900;cursor:pointer}.inlineBtn.danger{border-color:rgba(248,113,113,.58);background:rgba(127,29,29,.48)}.inlineStatus{font-size:12px;color:rgba(255,255,255,.62);font-weight:700;align-self:center}@media (max-width:980px){.browserLayout{grid-template-columns:1fr}.browserNav{position:static}.browserContent{min-height:unset}}
</style></head><body data-page="page" data-back="index.html"><div class="container"><div id="bw-global-header"></div><div id="userIndicator">Loading user...</div><section class="heroPanel"><div class="heroIcon">❓</div><h1>FAQs</h1><p class="subtitle" style="text-align:center;max-width:820px;margin:10px auto 0">Quick answers for common branch questions and recurring scenarios. FAQ headings mirror SOP headings.</p></section><section class="browserLayout"><aside class="browserNav"><div class="navTitle">FAQ Areas</div><div id="navRoot"></div></aside><main class="browserContent editableSurface"><div class="contentBadge" id="contentType"></div><h2 class="contentTitle editableText" id="contentTitle"></h2><p class="contentLead editableText" id="contentLead"></p><div id="contentBody" class="placeholderCard"></div><div class="inlineActions"><button class="inlineBtn" id="addItemBtn" type="button">Add entry under this branch</button><button class="inlineBtn" id="addParagraphBtn" type="button">Add paragraph</button><button class="inlineBtn danger" id="deleteItemBtn" type="button">Delete selected entry</button><button class="inlineBtn" id="resetBtn" type="button">Reset staged content</button><span class="inlineStatus" id="inlineStatus">Editor mode: click text to edit.</span></div></main></section></div><script src="assets/js/bw-header.js"></script><script src="assets/js/content-store.js"></script><script>const PAGE_KEY='faq-items-v2';const DEFAULT_PAGE_DATA=[{"key": "sales", "icon": "🧾", "label": "Sales", "items": [{"key": "process-sales", "title": "Process Sales Order", "lead": "Content coming soon.", "body": "Content coming soon."}, {"key": "release-pickslip", "title": "Release Pickslip", "lead": "Content coming soon.", "body": "Content coming soon."}, {"key": "direct-deposit", "title": "Process Direct Deposit Sale", "lead": "Content coming soon.", "body": "Content coming soon."}]}, {"key": "inventory", "icon": "📦", "label": "Inventory", "items": [{"key": "search-product", "title": "Search For Product", "lead": "Content coming soon.", "body": "Content coming soon."}, {"key": "return-dc", "title": "Return to DC", "lead": "Content coming soon.", "body": "Content coming soon."}, {"key": "receiving-errors", "title": "Receiving Errors", "lead": "Content coming soon.", "body": "Content coming soon."}]}, {"key": "purchasing", "icon": "🛒", "label": "Purchasing", "items": [{"key": "sales-history", "title": "Check Sales History", "lead": "Content coming soon.", "body": "Content coming soon."}, {"key": "check-pricing", "title": "Check Pricing", "lead": "Content coming soon.", "body": "Content coming soon."}, {"key": "receipt-external", "title": "Receipt External Invoice", "lead": "Content coming soon.", "body": "Content coming soon."}, {"key": "receipt-internal", "title": "Receipt Internal Invoice", "lead": "Content coming soon.", "body": "Content coming soon."}]}, {"key": "management", "icon": "🧭", "label": "Management", "items": [{"key": "management-access", "title": "Access", "lead": "Access checklist references now live under Checklists.", "body": "For access review items, use the Checklists page. Notes for management access can be added here if needed."}]}];
function escapeHtml(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function slugify(v){return String(v||'item').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || 'item';}
let pageData=JSON.parse(JSON.stringify(DEFAULT_PAGE_DATA));
const navRoot=document.getElementById('navRoot'),contentType=document.getElementById('contentType'),contentTitle=document.getElementById('contentTitle'),contentLead=document.getElementById('contentLead'),contentBody=document.getElementById('contentBody'),inlineStatus=document.getElementById('inlineStatus');
let openTypeKey=pageData[0].key, activeItemKey=pageData[0].items[0].key;
function findType(key){return pageData.find(t=>t.key===key)||pageData[0];}
function findActive(){const type=findType(openTypeKey);const item=(type.items||[]).find(i=>i.key===activeItemKey)||(type.items||[])[0];return {type,item};}
async function savePageData(){if(!window.BWContentStore)return;inlineStatus.textContent='Saving…';try{await BWContentStore.save(PAGE_KEY,pageData);inlineStatus.textContent='Saved';}catch(e){inlineStatus.textContent='Save failed: '+e.message;}}
let saveTimer=null;function queueSave(){clearTimeout(saveTimer);saveTimer=setTimeout(savePageData,500);}
function renderNav(){navRoot.innerHTML='';pageData.forEach(type=>{const block=document.createElement('div');block.className='typeBlock'+(type.key===openTypeKey?' open':'');const btn=document.createElement('button');btn.className='typeButton';btn.type='button';btn.innerHTML=`<span class="typeLabel"><span class="typeIcon">${escapeHtml(type.icon||'📄')}</span><span>${escapeHtml(type.label||'Area')}</span></span><span class="typeChevron">›</span>`;btn.onclick=()=>{openTypeKey=type.key;if(type.items&&type.items.length)activeItemKey=type.items[0].key;renderNav();renderContent(type,type.items[0]);};const subList=document.createElement('div');subList.className='subList';(type.items||[]).forEach(item=>{const subBtn=document.createElement('button');subBtn.className='subButton'+(item.key===activeItemKey?' active':'');subBtn.type='button';subBtn.textContent=item.title||'Item';subBtn.onclick=()=>{openTypeKey=type.key;activeItemKey=item.key;renderNav();renderContent(type,item);};subList.appendChild(subBtn);});block.appendChild(btn);block.appendChild(subList);navRoot.appendChild(block);});}
function renderContent(type,item){if(!type||!item)return;contentType.textContent=`${type.icon||'📄'} ${type.label||'Area'}`;contentTitle.textContent=item.title||'Item';contentLead.textContent=item.lead||'Content coming soon.';const body=String(item.body||'Content coming soon.').split(/
+/).filter(Boolean).map(p=>`<p class="editableText" data-field="body" contenteditable="${document.body.classList.contains('bw-can-edit')}">${escapeHtml(p)}</p>`).join('');contentBody.innerHTML=body||'<p class="editableText" data-field="body" contenteditable="true">Content coming soon.</p>';contentTitle.setAttribute('contenteditable',document.body.classList.contains('bw-can-edit'));contentLead.setAttribute('contenteditable',document.body.classList.contains('bw-can-edit'));}
function captureCurrent(){const {item}=findActive();if(!item)return;item.title=contentTitle.textContent.trim()||'Untitled';item.lead=contentLead.textContent.trim()||'';item.body=Array.from(contentBody.querySelectorAll('[data-field="body"]')).map(p=>p.textContent.trim()).filter(Boolean).join('

')||'Content coming soon.';}
contentTitle.addEventListener('input',()=>{captureCurrent();renderNav();queueSave();});contentLead.addEventListener('input',()=>{captureCurrent();queueSave();});contentBody.addEventListener('input',()=>{captureCurrent();queueSave();});
document.getElementById('addItemBtn').onclick=()=>{const {type}=findActive();if(!type)return;const base='New item';const key=slugify(base+'-'+Date.now());const item={key,title:base,lead:'Lead text',body:'Description'};(type.items||(type.items=[])).push(item);openTypeKey=type.key;activeItemKey=key;renderNav();renderContent(type,item);savePageData();setTimeout(()=>contentTitle.focus(),0);};
document.getElementById('deleteItemBtn').onclick=()=>{const {type,item}=findActive();if(!type||!item)return;if((type.items||[]).length<=1){alert('Each area needs at least one item.');return;}if(!confirm('Delete '+(item.title||'selected item')+'?'))return;const idx=type.items.findIndex(i=>i.key===item.key);if(idx>=0)type.items.splice(idx,1);activeItemKey=(type.items[Math.max(0,idx-1)]||type.items[0]).key;renderNav();renderContent(type,type.items.find(i=>i.key===activeItemKey));savePageData();};
document.getElementById('addParagraphBtn').onclick=()=>{const p=document.createElement('p');p.className='editableText';p.dataset.field='body';p.contentEditable=document.body.classList.contains('bw-can-edit');p.textContent='Description';contentBody.appendChild(p);captureCurrent();queueSave();p.focus();};
document.getElementById('resetBtn').onclick=async()=>{if(!confirm('Reset this page to the built-in defaults?'))return;pageData=JSON.parse(JSON.stringify(DEFAULT_PAGE_DATA));openTypeKey=pageData[0].key;activeItemKey=pageData[0].items[0].key;renderNav();renderContent(pageData[0],pageData[0].items[0]);if(window.BWContentStore)await BWContentStore.remove(PAGE_KEY).catch(e=>alert('Reset failed: '+e.message));};
function applyRemote(remote){if(Array.isArray(remote)&&remote.length){pageData=remote;openTypeKey=pageData[0].key;activeItemKey=pageData[0].items&&pageData[0].items[0]?pageData[0].items[0].key:'';renderNav();renderContent(pageData[0],pageData[0].items[0]);}}
function init(){renderNav();renderContent(pageData[0],pageData[0].items[0]);if(window.BWContentStore){const quick=BWContentStore.getFast(PAGE_KEY,null,applyRemote);applyRemote(quick);BWContentStore.waitForUser().then(()=>renderContent(findActive().type,findActive().item)).catch(()=>{});}document.addEventListener('bw:user-ready',()=>renderContent(findActive().type,findActive().item));}
init();
</script><script src="assets/js/global.js"></script></body></html>
